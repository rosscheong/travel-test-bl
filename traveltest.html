<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Site - Select Option</title>
  <!-- Load FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Reset and Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f4f7f6;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 900px;
      padding: 2rem;
      width: 100%;
    }

    .header-text {
      margin-bottom: 3rem;
    }

    .header-text h1 {
      font-size: 2.5rem;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .header-text p {
      font-size: 1.1rem;
      color: #666;
    }

    /* Grid Layout for the Cards */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
    }

    /* Card Styling */
    .option-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-decoration: none;
      color: #333;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid transparent;
    }

    /* Interactive Hover Effects */
    .option-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.1);
      border-color: #007bff; /* Highlights the card with a brand color */
    }

    .option-card i {
      font-size: 3rem;
      color: #007bff;
      margin-bottom: 1rem;
      transition: color 0.3s ease;
    }

    .option-card h2 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* Responsive adjustment for mobile */
    @media (max-width: 600px) {
      .header-text h1 {
        font-size: 2rem;
      }
      .option-card {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-text">
      <h1>Where to next?</h1>
      <p>Select what you are looking for to start planning.</p>
    </div>

    <div class="options-grid">
      <!-- Update the href attributes with the actual URLs of your pages -->
      
      <a href="/homestays" class="option-card">
        <i class="fa-solid fa-house"></i>
        <h2>Homestay</h2>
      </a>

      <a href="/hotels" class="option-card">
        <i class="fa-solid fa-hotel"></i>
        <h2>Hotel</h2>
      </a>

      <a href="/flights" class="option-card">
        <i class="fa-solid fa-plane-departure"></i>
        <h2>Flight</h2>
      </a>
      
    </div>
  </div>

</body>
</html>
